services:
  app:
    build: .
    container_name: stt-tts-unified
    ports:
      - "8008:8000"
    volumes:
      # Persist uploads, results, audio files, and SQLite DB between restarts
      - ./data:/app/data
      # Cache Whisper model weights so they survive container rebuilds
      - ./whisper-cache:/root/.cache/whisper
    environment:
      - UPLOAD_DIR=data/uploads
      - RESULT_DIR=data/results
      - AUDIO_DIR=data/audio
      - DB_PATH=data/history.db
      - DEFAULT_WHISPER_MODEL=base
    restart: unless-stopped

